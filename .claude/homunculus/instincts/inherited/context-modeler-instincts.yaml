# Context Modeler Workflow Feature Development With Ai Or Service Layer

## Action

Follow the feature-development-with-ai-or-service-layer workflow:
1. Create or update serverless API endpoint files under api/
2. Add supporting utility or prompt files under api/lib/
3. Update or add configuration files (e.g., api/package.json, api/tsconfig.json, api/vercel.json, .env.example, .gitignore)
4. Implement new frontend components in src/components/
5. Add new React hooks in src/hooks/
6. Create or update service and types files in src/services/
7. Write or update tests for new services/components
8. Update documentation or product/tech stack notes (e.g., CLAUDE.md, conductor/product.md, conductor/tech-stack.md)
9. Update or add Vite/TypeScript config files if needed

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: api/*.ts, api/lib/*.ts, api/package.json

