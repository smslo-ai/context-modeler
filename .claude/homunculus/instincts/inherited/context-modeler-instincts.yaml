# Context Modeler Workflow Code Review Refactor And Cleanup

## Action

Follow the code-review-refactor-and-cleanup workflow:
1. Delete unused or dead service files and their tests in src/services/
2. Update documentation files (e.g., CLAUDE.md) to reflect changes or review findings
3. Update conductor progress tracking files (conductor/tracks.md, conductor/tracks/*/plan.md, metadata.json, index.md)
4. Validate that tests pass and that test coverage is not lost
5. Spot-check or update tests to ensure coverage for logic moved or consolidated

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: src/services/*.ts, src/services/*.test.ts, CLAUDE.md

